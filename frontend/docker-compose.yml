services:
  frontend:
    container_name: watt-mate-frontend
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    # 1. git 설치 2. 패키지 설치 3. Vite 서버 실행 (0.0.0.0으로 강제 개방)
    command: >
      sh -c "apk add --no-cache git && 
             npm install && 
             npm run dev -- --host 0.0.0.0"